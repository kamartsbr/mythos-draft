name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Atualizado para a versão 22 para compatibilidade com Firebase Tools v15
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - run: npm install
      
      # Build do projeto usando a variável de ambiente do Firebase
      - run: CI=false npm run build
        env:
          VITE_FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
          
      # Deploy final para o Firebase
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_BOXWOOD_PLATING_368522 }}'
          channelId: live
          projectId: boxwood-plating-368522
